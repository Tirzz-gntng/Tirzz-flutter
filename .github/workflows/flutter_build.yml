name: Flutter Build Release APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: false
        type: string
        default: 'build'
      build_type:
        description: 'Tipe build (apk/aab)'
        required: false
        type: string
        default: 'apk'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download & Extract Project ZIP
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          unzip -o project.zip -d .

      - name: Detect Project Root
        run: |
          PUBSPEC_PATH=$(find . -maxdepth 4 -name "pubspec.yaml" | head -n 1)
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Project root ditemukan di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Decode Keystore
        run: |
          mkdir -p "${{ env.PROJECT_DIR }}/android/app"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ env.PROJECT_DIR }}/android/app/keystore.jks"

      - name: Create key.properties
        run: |
          echo "storeFile=keystore.jks" > "${{ env.PROJECT_DIR }}/android/key.properties"
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> "${{ env.PROJECT_DIR }}/android/key.properties"
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> "${{ env.PROJECT_DIR }}/android/key.properties"
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> "${{ env.PROJECT_DIR }}/android/key.properties"

      - name: Flutter Pub Get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Flutter Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storeFile=keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
